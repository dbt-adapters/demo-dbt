snk_demo:
  outputs:
    dev:
      type: athena
      database: awsdatacatalog
      schema: snk_demo
      region_name: us-east-1
      s3_data_dir: s3://snk-demo-dev/
      s3_staging_dir: s3://snk-demo-dev/athena-dbt-query-results/
      num_boto3_retries: 5
      threads: 4
      work_group: snk-demo-athena-wg
      spark_work_group: snk-demo-spark-wg
      emr_application_name: snk-demo-emr-app
      emr_job_execution_role_arn: arn:aws:iam::111111111111:role/snk-demo-spark-execution-role
      lambda_function_name: snk-demo-spark-iceberg-lambda
      aws_profile: snk-admin
      debug_query_state: true
    prod:
      type: athena
      database: awsdatacatalog
      schema: snk_demo
      region_name: us-east-1
      s3_data_dir: s3://snk-demo-prod/
      s3_staging_dir: s3://snk-demo-prod/athena-dbt-query-results/
      num_boto3_retries: 15
      threads: 4
      work_group: snk-demo-athena-wg
      spark_work_group: snk-demo-spark-wg
      emr_application_name: snk-demo-emr-app
      emr_job_execution_role_arn: arn:aws:iam::222222222222:role/snk-demo-spark-execution-role
      lambda_function_name: snk-demo-spark-iceberg-lambda
  target: "{{ env_var('DBT_PROFILE','dev') }}"

elementary:
  outputs:
    default:
      type: "athena"
      region_name: "us-east-1"
      s3_staging_dir: "s3://snk-demo-dev/athena-dbt-query-results/"
      work_group: "snk-demo-athena-wg"
      catalog: "awsdatacatalog"
      schema: "snk_demo_artifacts"
      threads: 8
    dev:
      type: "athena"
      region_name: "us-east-1"
      s3_staging_dir: "s3://snk-demo-dev/athena-dbt-query-results/"
      work_group: "snk-demo-athena-wg"
      catalog: "awsdatacatalog"
      schema: "snk_demo_artifacts"
      threads: 8
    prod:
      type: "athena"
      region_name: "us-east-1"
      s3_staging_dir: "s3://snk-demo-prod/athena-dbt-query-results/"
      work_group: "snk-demo-athena-wg"
      catalog: "awsdatacatalog"
      schema: "snk_demo_artifacts"
      threads: 8
